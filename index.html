<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gửi Ngọc Ngân 🌷</title>

<style>
body{
    margin:0;
    min-height:100vh;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ffd6e8,#fff3f8,#dff6ff);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    overflow:hidden;
}
.card{
    width:90%;
    max-width:430px;
    background:white;
    padding:30px 22px;
    border-radius:28px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    z-index:2;
}
h1{
    color:#ff4f93;
    font-size:30px;
}
p{
    color:#444;
    font-size:19px;
    line-height:1.5;
}
.top-icons{
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.icon{
    font-size:65px;
    border:none;
    background:none;
    cursor:pointer;
}
.x-icon{
    font-size:28px;
}
.hand{
    animation:wave 1s infinite;
}
@keyframes wave{
    0%{transform:rotate(0deg);}
    25%{transform:rotate(18deg);}
    50%{transform:rotate(0deg);}
    75%{transform:rotate(-18deg);}
    100%{transform:rotate(0deg);}
}
.btn{
    display:block;
    width:90%;
    margin:12px auto;
    padding:13px;
    border:none;
    border-radius:25px;
    background:#ff4f93;
    color:white;
    font-size:18px;
    cursor:pointer;
}
.btn:hover{
    background:#ff2f80;
}
.back-btn{
    background:#aaa;
}
.sticker{
    position:absolute;
    font-size:32px;
    animation:float 4s infinite ease-in-out;
}
@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-18px);}
    100%{transform:translateY(0);}
}
audio{
    width:100%;
    margin-top:15px;
}
.big-icon{
    font-size:80px;
}
</style>
</head>

<body>

<div class="sticker" style="top:8%;left:10%;">💖</div>
<div class="sticker" style="top:15%;right:12%;">🌸</div>
<div class="sticker" style="bottom:12%;left:14%;">🐰</div>
<div class="sticker" style="bottom:10%;right:15%;">✨</div>
<div class="sticker" style="top:50%;left:5%;">💕</div>
<div class="sticker" style="top:52%;right:6%;">🥰</div>

<div class="card" id="card">
    <div class="top-icons">
        <button class="icon hand" onclick="showMusicQuestion()">👋</button>
        <button class="icon x-icon" id="xBtn" onmouseover="runAway()" onclick="runAway()">❌</button>
    </div>

    <h1>Chào Ngọc Ngân 🌷</h1>
    <p>Bấm vào bàn tay nếu Ngân đang rảnh nha 😆</p>
    <p>🐰 💕 ✨</p>
</div>

<script>
let selectedMusic = "";

function runAway(){
    const btn = document.getElementById("xBtn");
    const x = Math.random() * (window.innerWidth - 80);
    const y = Math.random() * (window.innerHeight - 80);

    btn.style.position = "fixed";
    btn.style.left = x + "px";
    btn.style.top = y + "px";
    btn.style.zIndex = "99";
}

function sendResult(choice){
    fetch("https://formspree.io/f/mwvdknzv", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            ten: "Ngọc Ngân",
            the_loai_nhac: selectedMusic,
            lua_chon_cuoi: choice,
            thoi_gian: new Date().toLocaleString()
        })
    }).catch(function(){});
}

function showMusicQuestion(){
    document.getElementById("card").innerHTML = `
        <h1>Ngân thích nghe thể loại nhạc gì? 🎵</h1>
        <p>Chọn thử một thể loại đi nè 🌸</p>

        <button class="btn" onclick="playMusic('Nhạc chill 🌸','nhactinhyeu.mp3')">🌸 Nhạc chill</button>
        <button class="btn" onclick="playMusic('Nhạc buồn 🥺','nhactinhyeu.mp3')">🥺 Nhạc buồn</button>
        <button class="btn" onclick="playMusic('Nhạc remix 🔥','nhactinhyeu.mp3')">🔥 Nhạc remix</button>
        <button class="btn" onclick="playMusic('Nhạc tình yêu 💖','nhactinhyeu.mp3')">💖 Nhạc tình yêu</button>
    `;
}

function playMusic(style, fileName){
    selectedMusic = style;

    document.getElementById("card").innerHTML = `
        <h1>${style}</h1>
        <p>Ngân nghe thử đoạn này nha 🎶✨</p>

        <audio id="musicPlayer" controls autoplay>
            <source src="${fileName}" type="audio/mpeg">
        </audio>

        <p style="font-size:14px;color:#666;">
            Nếu nhạc chưa phát thì bấm nút Play nha 😆
        </p>

        <button class="btn back-btn" onclick="stopMusic(); showMusicQuestion()">🔙 Trở lại chọn thể loại khác</button>
        <button class="btn" onclick="stopMusic(); thankYou()">Tiếp ➡️</button>
    `;

    setTimeout(function(){
        const player = document.getElementById("musicPlayer");
        if(player){
            player.volume = 0.8;
            player.play().catch(function(){});
        }
    },100);
}

function stopMusic(){
    const player = document.getElementById("musicPlayer");
    if(player){
        player.pause();
        player.currentTime = 0;
    }
}

function thankYou(){
    document.getElementById("card").innerHTML = `
        <h1>Cảm ơn Ngân nha 🌷</h1>
        <p>
            Hôm nay anh chỉ hỏi 1 câu này thôi 😆<br>
            Những ngày tiếp theo anh sẽ có những thứ khác muốn cho Ngân xem tiếp.<br>
            Hãy nhớ xem nha 🐰✨
        </p>

        <button class="btn" onclick="okChoice()">Ok, nhớ xem 😆</button>
        <button class="btn back-btn" onclick="noChoice()">Không 😢</button>
    `;
}

function okChoice(){
    sendResult("Ok, nhớ xem 😆");

    document.getElementById("card").innerHTML = `
        <div class="big-icon">👋🐰</div>
        <h1>Bái bai Ngân nha 🌷</h1>
        <p>Hẹn Ngân ở điều bất ngờ tiếp theo nha 😆✨</p>
    `;
}

function noChoice(){
    sendResult("Không 😢");

    document.getElementById("card").innerHTML = `
        <div class="big-icon">🥺💔</div>
        <h1>Buồn quá...</h1>
        <p>Vậy web tự đóng nha 😢</p>
    `;

    setTimeout(function(){
        window.close();
        document.body.innerHTML = "";
    },1800);
}
</script>

</body>
</html>
